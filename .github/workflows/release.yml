name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored in the
# repo. One-time setup on PyPI: Manage project -> Publishing -> add a GitHub
# publisher with owner `spark-strategy`, repo `cubejs-client-python`,
# workflow `release.yml`, environment `pypi`.
#
# To cut a release: bump `version` in pyproject.toml, commit, then
#   git tag v0.1.0 && git push --tags
# PyPI versions are immutable — a version can never be re-uploaded.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os, pathlib, re, sys
          text = pathlib.Path("pyproject.toml").read_text()
          version = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M).group(1)
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          if version != tag:
              sys.exit(f"Tag {tag!r} does not match pyproject version {version!r}")
          print(f"version {version} matches tag")
          PY

      - name: Build
        run: python -m build

      - name: Check artifacts
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
